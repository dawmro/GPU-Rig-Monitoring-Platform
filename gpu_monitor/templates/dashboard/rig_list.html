{% extends "base.html" %}
{% block title %}Fleet Overview{% endblock %}
{% block content %}
<div class="max-w-7xl mx-auto">
    <div class="flex items-center justify-between mb-6">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-bold">Fleet Overview</h1>
            {% if user.is_staff %}
            <button type="button" id="toggle-owner-emails" onclick="toggleAllOwnerEmails()"
                    class="text-xs text-gray-500 hover:text-gray-300 border border-gray-600 rounded px-2 py-1 flex items-center gap-1"
                    title="Toggle owner email visibility for all rows">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <span>Show emails</span>
            </button>
            {% endif %}
        </div>
        <div class="flex items-center gap-3">
            <form class="flex gap-2">
                <input type="text" name="search" placeholder="Search rigs..." value="{{ search }}"
                       class="bg-gray-700 border border-gray-600 rounded px-3 py-1.5 text-sm text-white w-48">
                <select name="status" class="bg-gray-700 border border-gray-600 rounded px-3 py-1.5 text-sm text-white">
                    <option value="">All Status</option>
                    <option value="online" {% if status_filter == 'online' %}selected{% endif %}>Online</option>
                    <option value="stale" {% if status_filter == 'stale' %}selected{% endif %}>Stale</option>
                    <option value="offline" {% if status_filter == 'offline' %}selected{% endif %}>Offline</option>
                </select>
                <select name="tag" class="bg-gray-700 border border-gray-600 rounded px-3 py-1.5 text-sm text-white">
                    <option value="">All Tags</option>
                    {% for tag in all_tags %}
                    <option value="{{ tag.name }}" {% if tag_filter == tag.name %}selected{% endif %}>{{ tag.name }}</option>
                    {% endfor %}
                </select>
            </form>
        </div>
    </div>

    <div id="rig-table-container"
         hx-get="{% url 'dashboard:rig-list' %}?status={{ status_filter }}&search={{ search }}"
         hx-trigger="every 30s"
         hx-target="#rig-table-container"
         hx-swap="innerHTML"
         hx-indicator=".htmx-indicator">
        {% include "dashboard/_rig_table.html" %}
    </div>
    <div class="flex items-center gap-2 text-gray-500 text-xs mt-2">
        <span class="htmx-indicator">⟳ Refreshing...</span>
        <span id="rig-table-container-clock"></span>
    </div>
</div>
{% endblock %}
