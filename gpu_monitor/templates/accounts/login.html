{% extends "base.html" %}
{% block title %}Sign In{% endblock %}
{% block content %}
<div class="flex items-center justify-center min-h-[60vh]">
    <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6">🖥️ GPU Rig Monitor</h1>
        {% if messages %}
        {% for message in messages %}
        <div class="bg-red-900/50 border border-red-500 text-red-200 px-4 py-2 rounded mb-4">{{ message }}</div>
        {% endfor %}
        {% endif %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" name="email" required
                    class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <div class="flex items-center justify-between">
                    <label class="block text-sm text-gray-400 mb-1">Password</label>
                    <a href="{% url 'accounts:password-reset' %}" class="text-xs text-blue-400 hover:text-blue-300">Forgot password?</a>
                </div>
                <input type="password" name="password" required
                    class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded transition">
                Sign In
            </button>
        </form>
        <p class="text-center text-gray-400 text-sm mt-6">
            Don't have an account?
            <a href="{% url 'accounts:register' %}" class="text-blue-400 hover:text-blue-300">Create Account</a>
        </p>
    </div>
</div>
{% endblock %}
