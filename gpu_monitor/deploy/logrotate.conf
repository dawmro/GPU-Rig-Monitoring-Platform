# Logrotate configuration for GPU Rig Monitoring Platform
# Install: sudo cp logrotate.conf /etc/logrotate.d/gpu-monitor
#
# This file is automatically read by logrotate via /etc/cron.daily/logrotate.
# No manual activation required beyond placing this file in /etc/logrotate.d/.
#
# Verify configuration:
#   sudo logrotate -d /etc/logrotate.d/gpu-monitor  # dry run
#   sudo logrotate -f /etc/logrotate.d/gpu-monitor  # force rotation

# Gunicorn access log — high volume, rotate daily, keep 14 days
# Created by gunicorn (runs as monitoring user)
/opt/gpu_monitor/logs/gunicorn-access.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 monitoring monitoring
    sharedscripts
    postrotate
        systemctl reload gunicorn 2>/dev/null || true
    endscript
}

# Gunicorn error log — low volume, rotate weekly, keep 8 weeks
# Created by gunicorn (runs as monitoring user)
/opt/gpu_monitor/logs/gunicorn-error.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    create 0640 monitoring monitoring
    sharedscripts
    postrotate
        systemctl reload gunicorn 2>/dev/null || true
    endscript
}

# Cleanup log — from data_retention.sh cron (runs as root)
/opt/gpu_monitor/logs/cleanup.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    create 0640 root root
}

# Rig status log — from update_rig_status.sh cron (runs as root)
/opt/gpu_monitor/logs/rig_status.log {
    weekly
    missingok
    rotate 4
    compress
    delaycompress
    notifempty
    create 0640 root root
}

# Agent cron log — from agent cron (runs as monitoring-agent user)
/var/log/monitoring-agent/cron.log {
    weekly
    missingok
    rotate 4
    compress
    delaycompress
    notifempty
    create 0640 monitoring-agent monitoring-agent
}

# Cleanup cron log — from data_retention.sh cron wrapper (runs as root)
/var/log/monitoring-agent/cleanup-cron.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    create 0640 root root
}

# Agent update check log — from check_update.py (runs as monitoring-agent user)
/var/log/monitoring-agent/update.log {
    weekly
    missingok
    rotate 4
    compress
    delaycompress
    notifempty
    create 0640 monitoring-agent monitoring-agent
}
