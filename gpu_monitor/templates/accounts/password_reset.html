<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Rig Monitor - Reset Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-2">🖥️ GPU Rig Monitor</h1>
        <p class="text-gray-400 text-center mb-6">Reset your password</p>

        {% if form.errors %}
        <div class="bg-red-900/50 border border-red-500 text-red-200 px-4 py-2 rounded mb-4">
            <p class="text-sm">Please correct the errors below.</p>
        </div>
        {% endif %}

        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email address</label>
                <input type="email" name="email" required autofocus
                    class="w-full bg-gray-700 border border-gray-600 rounded px-3 py-2 text-white focus:outline-none focus:border-blue-500">
                {% if form.email.errors %}
                <p class="text-red-400 text-xs mt-1">{{ form.email.errors.0 }}</p>
                {% endif %}
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded transition">
                Send Reset Link
            </button>
        </form>

        <p class="text-center text-gray-400 text-sm mt-6">
            <a href="{% url 'accounts:login' %}" class="text-blue-400 hover:text-blue-300">← Back to Sign In</a>
        </p>
    </div>
</body>
</html>
