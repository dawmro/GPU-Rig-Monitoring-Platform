<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GPU Rig Monitor{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        .htmx-indicator { opacity: 0; transition: opacity 200ms; }
        .htmx-request .htmx-indicator { opacity: 1; }
        .badge-online { background: #065f46; color: #6ee7b7; }
        .badge-stale { background: #78350f; color: #fcd34d; }
        .badge-offline { background: #7f1d1d; color: #fca5a5; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    {% if user.is_authenticated %}
    <nav class="bg-gray-800 border-b border-gray-700 px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-6">
            <a href="{% url 'dashboard:rig-list' %}" class="text-lg font-bold">🖥️ GPU Rig Monitor</a>
            <a href="{% url 'dashboard:rig-list' %}" class="text-gray-400 hover:text-white">Fleet</a>
            <a href="{% url 'accounts:tags' %}" class="text-gray-400 hover:text-white">Tags</a>
            <a href="{% url 'accounts:api-keys' %}" class="text-gray-400 hover:text-white">API Keys</a>
        </div>
        <div class="flex items-center gap-4">
            <a href="{% url 'accounts:profile' %}" class="text-gray-400 hover:text-white text-sm">{{ user.email }}</a>
            <a href="{% url 'accounts:logout' %}" class="text-gray-400 hover:text-white text-sm">Logout</a>
        </div>
    </nav>
    {% endif %}
    <main class="p-6">
        {% block content %}{% endblock %}
    </main>

    <script>
    // HTMX refresh clock — update on any HTMX swap
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        var targetId = evt.detail && evt.detail.target && evt.detail.target.id;
        if (!targetId) return;
        // Only update the single global refresh clock
        var clock = document.getElementById('global-refresh-clock');
        if (clock) {
            var d = new Date();
            clock.textContent = 'Refreshed @ ' +
                String(d.getHours()).padStart(2,'0') + ':' +
                String(d.getMinutes()).padStart(2,'0') + ':' +
                String(d.getSeconds()).padStart(2,'0');
        }
    });

    // Toggle all owner emails in fleet overview
    function toggleAllOwnerEmails() {
        var btn = document.getElementById('toggle-owner-emails');
        var showEmails = btn.querySelector('span').textContent === 'Show emails';
        
        document.querySelectorAll('.owner-row').forEach(function(row) {
            var safe = row.querySelector('.owner-safe');
            var email = row.querySelector('.owner-email');
            if (showEmails) {
                safe.classList.add('hidden');
                email.classList.remove('hidden');
            } else {
                safe.classList.remove('hidden');
                email.classList.add('hidden');
            }
        });
        
        btn.querySelector('span').textContent = showEmails ? 'Hide emails' : 'Show emails';
    }
    </script>
</body>
</html>
