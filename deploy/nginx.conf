server {
    listen 80;
    server_name monitor.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name monitor.example.com;

    ssl_certificate /etc/letsencrypt/live/monitor.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/monitor.example.com/privkey.pem;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' unpkg.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.tailwindcss.com;" always;

    # Rate limiting
    # Per-rig-uuid: each rig gets its own rate limit (no IP-based blocking)
    limit_req_zone $http_x_rig_uuid zone=rig:10m rate=2r/m;
    # General: per-IP for non-ingest endpoints (dashboard, static)
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/s;

    client_max_body_size 2m;

    # Static files
    location /static/ {
        alias /opt/gpu_monitor/staticfiles/;
        expires 1d;
        limit_req zone=general burst=50 nodelay;
    }

    # API ingestion endpoint
    location /api/v1/ingest/ {
        limit_req zone=rig burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All other requests (dashboard, login, etc.)
    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
