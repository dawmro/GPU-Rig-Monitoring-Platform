# Logrotate configuration for GPU Rig Monitoring Platform
# Install: sudo cp logrotate.conf /etc/logrotate.d/gpu-monitor

# Gunicorn access log — high volume, rotate daily, keep 14 days
/opt/gpu_monitor/logs/gunicorn-access.log {
    daily
    missingok
    rotate 14
    compress
    delaycompress
    notifempty
    create 0640 monitoring monitoring
    sharedscripts
    postrotate
        systemctl reload gunicorn 2>/dev/null || true
    endscript
}

# Gunicorn error log — low volume, rotate weekly, keep 8 weeks
/opt/gpu_monitor/logs/gunicorn-error.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    create 0640 monitoring monitoring
    sharedscripts
    postrotate
        systemctl reload gunicorn 2>/dev/null || true
    endscript
}

# Cleanup log — daily append, rotate weekly, keep 8 weeks
/opt/gpu_monitor/logs/cleanup.log {
    weekly
    missingok
    rotate 8
    compress
    delaycompress
    notifempty
    create 0640 monitoring monitoring
}

# Rig status log — from update_rig_status.sh cron (every 2 min), rotate weekly, keep 4 weeks
/opt/gpu_monitor/logs/rig_status.log {
    weekly
    missingok
    rotate 4
    compress
    delaycompress
    notifempty
    create 0640 monitoring monitoring
}

# Agent cron log — low volume, rotate weekly, keep 4 weeks
/var/log/monitoring-agent/cron.log {
    weekly
    missingok
    rotate 4
    compress
    delaycompress
    notifempty
    create 0640 monitoring-agent monitoring-agent
}
