<div class="flex flex-wrap gap-2 items-center" id="rig-tags">
    {% for tag in rig.tags.all %}
    <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs"
          style="background: {{ tag.color }}22; color: {{ tag.color }}">
        {{ tag.name }}
        <form method="post" action="{% url 'dashboard:rig-toggle-tag' rig.uuid tag.id %}" class="inline">
            {% csrf_token %}
            <button type="submit" class="hover:text-white text-[10px] leading-none ml-0.5" title="Remove tag">×</button>
        </form>
    </span>
    {% endfor %}

    {# Add tag dropdown #}
    {% with user_tags=rig.owner.rig_tags.all %}
    {% if user_tags %}
    <div class="relative">
        <button onclick="document.getElementById('tag-add-menu-{{ rig.uuid }}').classList.toggle('hidden')"
                class="text-xs text-gray-500 hover:text-gray-300 px-2 py-0.5 rounded border border-dashed border-gray-600 hover:border-gray-400">
            + Add tag
        </button>
        <div id="tag-add-menu-{{ rig.uuid }}" class="hidden absolute top-full left-0 mt-1 bg-gray-800 border border-gray-700 rounded shadow-lg z-10 min-w-40 max-h-48 overflow-y-auto">
            {% for tag in user_tags %}
            {% if tag not in rig.tags.all %}
            <form method="post" action="{% url 'dashboard:rig-toggle-tag' rig.uuid tag.id %}">
                {% csrf_token %}
                <button type="submit" class="w-full text-left px-3 py-1.5 text-sm hover:bg-gray-700 flex items-center gap-2">
                    <span class="w-3 h-3 rounded-full flex-shrink-0" style="background: {{ tag.color }}"></span>
                    {{ tag.name }}
                </button>
            </form>
            {% endif %}
            {% endfor %}
        </div>
    </div>
    {% endif %}
    {% endwith %}
</div>
