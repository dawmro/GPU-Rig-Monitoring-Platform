<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Rig Monitor - Password Reset Complete</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-2">🖥️ GPU Rig Monitor</h1>
        <p class="text-gray-400 text-center mb-6">Password reset complete</p>

        <div class="bg-green-900/50 border border-green-500 text-green-200 px-4 py-3 rounded mb-4">
            <p class="text-sm">Your password has been set. You can now sign in with your new password.</p>
        </div>

        <a href="{% url 'accounts:login' %}" class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded transition text-center">
            Sign In
        </a>
    </div>
</body>
</html>
