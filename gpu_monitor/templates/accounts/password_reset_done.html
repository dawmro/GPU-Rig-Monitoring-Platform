<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPU Rig Monitor - Reset Email Sent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-2">🖥️ GPU Rig Monitor</h1>
        <p class="text-gray-400 text-center mb-6">Check your email</p>

        <div class="bg-green-900/50 border border-green-500 text-green-200 px-4 py-3 rounded mb-4">
            <p class="text-sm">We've sent you a password reset link. Check your email inbox (and spam folder).</p>
        </div>

        <p class="text-gray-400 text-sm text-center">
            Didn't receive the email? Make sure you entered the correct email address, or
            <a href="{% url 'accounts:password-reset' %}" class="text-blue-400 hover:text-blue-300">try again</a>.
        </p>

        <p class="text-center text-gray-400 text-sm mt-6">
            <a href="{% url 'accounts:login' %}" class="text-blue-400 hover:text-blue-300">← Back to Sign In</a>
        </p>
    </div>
</body>
</html>
